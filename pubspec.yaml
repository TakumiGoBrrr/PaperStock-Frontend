name: paperstock
description: PaperStock - swipe stories, discover writers.
publish_to: "none"

version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  go_router: ^14.2.0
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg
    - assets/logo_transparent.png
    - assets/logo_dark.png
    - assets/logo_light.png
