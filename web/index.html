<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PaperStock">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>PaperStock</title>
  <link rel="manifest" href="manifest.json?v=2">

  <script>
    (function () {
      var theme = localStorage.getItem('flutter.theme_mode');
      var isDark = theme !== 'light';

      // Keep the initial loading screen matching the theme
      // Dark mode: #16140f (leatherBrown) & #f4edd8 (inkParchment)
      // Light mode: #FAF6EE (_lightSurface) & #1c1a14 (_lightOnSurface)
      var bg = isDark ? '#16140f' : '#FAF6EE';
      var fg = isDark ? '#f4edd8' : '#1c1a14';

      var style = document.createElement('style');
      style.innerHTML =
        'html, body#app-body { background-color: ' + bg + ' !important; }\n' +
        '#loading { color: ' + fg + ' !important; background-color: ' + bg + ' !important; }';
      document.head.appendChild(style);
    })();
  </script>
  <style>
    .ios-prompt-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999999;
      width: 90%;
      max-width: 320px;
      animation: iosSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      pointer-events: none;
    }
    @keyframes iosSlideUp {
      from { transform: translate(-50%, 100px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    .ios-prompt-bubble {
      background: rgba(28, 28, 18, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px 16px;
      position: relative;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
    }
    .ios-prompt-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      color: #a39c87;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .ios-prompt-close:hover {
      color: #fff;
    }
    .ios-prompt-content {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ios-prompt-logo {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    .ios-prompt-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: left;
      padding-right: 12px;
    }
    .ios-share-icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" fill="%23007aff"><path d="M30 15h-3.8v9c0 .7-.6 1.2-1.2 1.2s-1.2-.5-1.2-1.2v-9H20c-.7 0-1.2-.5-1.2-1.2s.5-1.2 1.2-1.2h3.8V4.3l-2.9 2.9c-.5.5-1.2.5-1.7 0s-.5-1.2 0-1.7l5-5c.5-.5 1.2-.5 1.7 0l5 5c.5.5.5 1.2 0 1.7s-1.2.5-1.7 0l-2.9-2.9v9.4H30c.7 0 1.2.6 1.2 1.2s-.5 1.2-1.2 1.2zm10 10H31v2.5h8.8V45H10.2V27.5H19V25H10c-1.4 0-2.5 1.1-2.5 2.5v17.5c0 1.4 1.1 2.5 2.5 2.5h29c1.4 0 2.5-1.1 2.5-2.5V27.5c0-1.4-1.1-2.5-2.5-2.5z"/></svg>');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      vertical-align: middle;
      margin: 0 2px;
    }
    .ios-prompt-arrow {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(28, 28, 18, 0.9);
    }
  </style>
</head>
<body style="background-color: #16140f;" id="app-body">
  <script>
    const theme = localStorage.getItem('flutter.theme_mode');
    const isDark = theme !== 'light';
    document.body.style.backgroundColor = isDark ? '#16140f' : '#FAF6EE';
  </script>

  <style>
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #16140f;
      font: 700 28px ui-serif, Georgia, serif;
      letter-spacing: 0.2px;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }
  </style>

  <div id="loading">PaperStock</div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.style.pointerEvents = 'none';
        el.style.opacity = '0';
        setTimeout(function() {
          el.remove();
        }, 500);
      }
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- iOS PWA Install Prompt -->
  <div id="ios-pwa-prompt" class="ios-prompt-container" style="display: none;">
    <div class="ios-prompt-bubble">
      <button class="ios-prompt-close" id="ios-prompt-close-btn" aria-label="Close">&times;</button>
      <div class="ios-prompt-content">
        <div class="ios-prompt-logo">
          <img src="favicon.png" alt="PaperStock Logo" width="40" height="40" style="border-radius: 8px;">
        </div>
        <div class="ios-prompt-text">
          <h4 style="margin: 0; font-size: 14px; font-weight: 600; color: #fff;">Add to Home Screen</h4>
          <p style="margin: 2px 0 0 0; font-size: 12px; color: #a39c87; line-height: 1.4;">
            Tap the <span class="ios-share-icon"></span> share button in Safari, then select <strong>Add to Home Screen</strong>.
          </p>
        </div>
      </div>
      <div class="ios-prompt-arrow"></div>
    </div>
  </div>

  <script>
    (function() {
      // Check if iOS (iPhone/iPad/iPod)
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) || 
                    (/Macintosh/i.test(navigator.userAgent) && navigator.maxTouchPoints > 1);
                    
      // Check if Standalone (launched as PWA)
      const isStandalone = window.navigator.standalone === true || 
                           window.matchMedia('(display-mode: standalone)').matches;
                           
      // Check if dismissed
      const isDismissed = localStorage.getItem('ios-pwa-prompt-dismissed') === 'true';
      
      if (isIOS && !isStandalone && !isDismissed) {
        // Show prompt after 3 seconds
        setTimeout(() => {
          const prompt = document.getElementById('ios-pwa-prompt');
          if (prompt) {
            prompt.style.display = 'block';
            
            const closeBtn = document.getElementById('ios-prompt-close-btn');
            if (closeBtn) {
              closeBtn.addEventListener('click', () => {
                prompt.style.display = 'none';
                localStorage.setItem('ios-pwa-prompt-dismissed', 'true');
              });
            }
          }
        }, 3000);
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
