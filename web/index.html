<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PaperStock">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>PaperStock</title>
  <link rel="manifest" href="manifest.json?v=2">

  <script>
    (function () {
      var theme = localStorage.getItem('flutter.theme_mode');
      var isDark = theme !== 'light';

      // Keep the initial loading screen matching the theme
      // Dark mode: #16140f (leatherBrown) & #f4edd8 (inkParchment)
      // Light mode: #FAF6EE (_lightSurface) & #1c1a14 (_lightOnSurface)
      var bg = isDark ? '#16140f' : '#FAF6EE';
      var fg = isDark ? '#f4edd8' : '#1c1a14';

      var style = document.createElement('style');
      style.innerHTML =
        'html, body#app-body { background-color: ' + bg + ' !important; }\n' +
        '#loading { color: ' + fg + ' !important; background-color: ' + bg + ' !important; }';
      document.head.appendChild(style);
    })();
  </script>
</head>
<body style="background-color: #16140f;" id="app-body">
  <script>
    const theme = localStorage.getItem('flutter.theme_mode');
    const isDark = theme !== 'light';
    document.body.style.backgroundColor = isDark ? '#16140f' : '#FAF6EE';
  </script>

  <style>
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #16140f;
      font: 700 28px ui-serif, Georgia, serif;
      letter-spacing: 0.2px;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }
  </style>

  <div id="loading">PaperStock</div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.style.pointerEvents = 'none';
        el.style.opacity = '0';
        setTimeout(function() {
          el.remove();
        }, 500);
      }
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
